  # ── Tooltip descriptions (shown when hovering FormLayout labels) ──
  importer.source_file.desc: Absolute path of the source file on disk. The file is copied into the project's Assets folder.
  importer.destination.desc: Path relative to the Assets folder. The source extension is appended automatically when missing or different.
  importer.import.desc: Copy the source file to the destination and write a sibling .Jmeta metadata file.

  project_settings.script_state: Script State

  project_settings.width_px.desc: Game render target width in pixels.
  project_settings.height_px.desc: Game render target height in pixels.
  project_settings.pixels_per_unit.desc: How many pixels make up one world unit — used for sprite/physics coordinate conversion.
  project_settings.user_scripts.desc: Folder where the user's script sources are stored.
  project_settings.script_build.desc: Build configuration for the script DLL. Debug for debugging, Release for shipping.
  project_settings.script_state.desc: Current state of the live-compile module.
  project_settings.script_auto_rebuild.desc: When the editor regains focus, detect script source changes and rebuild automatically.
  project_settings.script_rebuild.desc: Build the script DLL right now and reload it.
  project_settings.script_unload.desc: Unload the currently loaded script DLL.
  build_settings.product_name.desc: Product name used for the output package folder and executable name.
  build_settings.windows_icon.desc: .ico asset applied to the Windows package executable. External files are copied to Assets/Package/Windows/AppIcon.ico, then the asset GUID is saved.
  build_settings.target_platform.desc: Target platform for the game package.
  build_settings.configuration.desc: Engine game build configuration. Maps to Debug_Game or Release_Game.
  build_settings.output_directory.desc: Output directory for the game package. Paths inside the project are saved relative to the project root.
  build_settings.startup_scene.desc: Scene opened when the game starts. Files inside Assets are saved relative to the Assets folder.
  build_settings.use_current_scene.desc: Set the currently opened scene as the startup scene and add it to build scenes.
  build_settings.package_preview.desc: Final package folder for the current settings.
  build_settings.apply.desc: Save changed build settings to the project and close the window.
  build_settings.cancel.desc: Discard changes and close the window.
  project_settings.language.desc: Pick the language used by the editor UI.
  project_settings.audio.master_volume.desc: Final gain applied to the whole game's audio output. Range 0.0~2.0 (1.0 = original).
  project_settings.apply.desc: Save the changed settings to the project and close the window.
  project_settings.cancel.desc: Discard changes and close the window.

  inspector.slice_type.desc: How to slice the sprite sheet. None=single frame, Automatic=auto-detect, CellSize/CellCount=manual grid.
  inspector.row_count.desc: Number of rows in the grid.
  inspector.column_count.desc: Number of columns in the grid.
  inspector.cell_width.desc: Width of one cell in pixels.
  inspector.cell_height.desc: Height of one cell in pixels.
  inspector.margin_x.desc: Left/right margin around the sheet, in pixels.
  inspector.margin_y.desc: Top/bottom margin around the sheet, in pixels.
  inspector.gap_x.desc: Horizontal gap between cells, in pixels.
  inspector.gap_y.desc: Vertical gap between cells, in pixels.
  inspector.pivot_x.desc: Pivot X used for rotation/alignment (0=left, 1=right, 0.5=center).
  inspector.pivot_y.desc: Pivot Y used for rotation/alignment (0=bottom, 1=top, 0.5=center).
  inspector.pixels_per_unit.desc: Pixels per world unit for this sprite.

  inspector.audio.mode.desc: Decompressed=fully decode into memory (recommended for short SFX), Streaming=decode from disk on the fly (recommended for long BGM).
  inspector.audio.default_bus.desc: Default bus (channel) this sound plays through. Can be overridden per instance from the component.
  inspector.audio.default_volume.desc: Default volume applied when playback starts. Used unless the component overrides it.
  inspector.audio.loop.desc: Restart automatically when playback ends. Can be overridden from the component.
  inspector.audio.is_3d.desc: When on, volume attenuates with distance from the AudioListener. Turn this off for UI/BGM.
  inspector.audio.min_distance.desc: Plays at full volume within this distance.
  inspector.audio.max_distance.desc: Beyond this distance the sound becomes inaudible. (Min ≤ Max)

  inspector.audio.preview.play: Play
