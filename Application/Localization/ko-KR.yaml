  importer.source_file.desc: 디스크에 있는 원본 파일의 절대 경로입니다. 이 파일이 프로젝트 Assets 폴더로 복사됩니다.
  importer.destination.desc: Assets 폴더 기준 상대 경로입니다. 확장자가 없거나 다르면 원본 확장자가 자동 부여됩니다.
  importer.import.desc: 원본 파일을 출력 경로로 복사하고, 같은 위치에 .Jmeta 메타파일을 생성합니다.

