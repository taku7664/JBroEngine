  inspector.margin_y.desc: 시트 상/하 가장자리 여백 (px).
  inspector.gap_x.desc: 셀 사이의 가로 간격 (px).
  inspector.gap_y.desc: 셀 사이의 세로 간격 (px).
  inspector.pivot_x.desc: 스프라이트의 회전·정렬 기준점 X (0=좌, 1=우, 0.5=중앙).
  inspector.pivot_y.desc: 스프라이트의 회전·정렬 기준점 Y (0=하, 1=상, 0.5=중앙).
  inspector.pixels_per_unit.desc: 이 스프라이트의 1 월드 유닛당 픽셀 수.

  inspector.audio.mode.desc: Decompressed=메모리에 통째로 디코딩(짧은 효과음 권장), Streaming=디스크에서 점진 디코딩(긴 BGM 권장).
  inspector.audio.default_bus.desc: 이 사운드가 기본으로 출력될 버스(채널)입니다. 컴포넌트에서 인스턴스 단위로 오버라이드할 수 있습니다.
  inspector.audio.default_volume.desc: 재생 시작 시 적용될 기본 볼륨입니다. 컴포넌트가 따로 지정하지 않으면 이 값을 사용합니다.
  inspector.audio.loop.desc: 재생 종료 후 자동으로 처음부터 다시 시작합니다. 컴포넌트에서 오버라이드할 수 있습니다.
  inspector.audio.is_3d.desc: 켜면 청취자(AudioListener)와의 거리에 따라 볼륨이 감쇠됩니다. UI/BGM 은 꺼두세요.
  inspector.audio.min_distance.desc: 이 거리 이내에서는 최대 볼륨으로 재생됩니다.
  inspector.audio.max_distance.desc: 이 거리를 넘어서면 들리지 않습니다. (Min ≤ Max)

