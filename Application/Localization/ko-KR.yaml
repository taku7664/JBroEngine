  project_settings.width_px.desc: 게임 렌더 타깃의 가로 픽셀 수입니다.
  project_settings.height_px.desc: 게임 렌더 타깃의 세로 픽셀 수입니다.
  project_settings.pixels_per_unit.desc: 1 월드 유닛이 차지하는 픽셀 수. 스프라이트·물리 좌표 변환에 사용됩니다.
  project_settings.user_scripts.desc: 사용자 스크립트 소스가 저장되는 폴더 경로입니다.
  project_settings.script_build.desc: 스크립트 DLL 을 빌드할 구성. Debug 는 디버깅용, Release 는 배포용입니다.
  project_settings.script_state.desc: 라이브 컴파일 모듈의 현재 상태입니다.
  project_settings.script_auto_rebuild.desc: 에디터가 다시 포커스될 때 스크립트 소스 변경을 감지해 자동으로 다시 빌드합니다.
  project_settings.script_rebuild.desc: 지금 즉시 스크립트 DLL 을 빌드하고 다시 로드합니다.
  project_settings.script_unload.desc: 현재 로드된 스크립트 DLL 을 언로드합니다.
  build_settings.product_name.desc: 빌드 산출물 폴더와 실행 파일 이름에 사용할 제품 이름입니다.
  build_settings.target_platform.desc: 게임 빌드를 생성할 대상 플랫폼입니다.
  build_settings.configuration.desc: 엔진 게임 빌드 구성입니다. Debug_Game 또는 Release_Game에 대응합니다.
  build_settings.output_directory.desc: 게임 패키지가 생성될 출력 폴더입니다. 프로젝트 내부 경로는 프로젝트 루트 기준 상대 경로로 저장합니다.
  build_settings.startup_scene.desc: 게임 시작 시 열 씬입니다. Assets 폴더 내부 파일은 Assets 기준 상대 경로로 저장합니다.
  build_settings.use_current_scene.desc: 현재 열려있는 씬을 시작 씬으로 설정하고 빌드 씬 목록에 추가합니다.
  build_settings.package_preview.desc: 현재 설정으로 생성될 최종 패키지 폴더입니다.
  build_settings.apply.desc: 변경된 빌드 설정을 프로젝트에 저장하고 창을 닫습니다.
  build_settings.cancel.desc: 변경 사항을 버리고 창을 닫습니다.
  project_settings.language.desc: 에디터 UI 에 사용할 언어를 선택합니다.
  project_settings.audio.master_volume.desc: 게임 전체 사운드 출력의 최종 게인입니다. 0.0~2.0 범위 (1.0 = 원본 크기).
  project_settings.apply.desc: 변경된 설정을 프로젝트에 저장하고 창을 닫습니다.
  project_settings.cancel.desc: 변경 사항을 버리고 창을 닫습니다.

  inspector.slice_type.desc: 스프라이트 시트를 어떻게 잘라낼지 결정합니다. None=단일 프레임, Automatic=자동 감지, CellSize/CellCount=수동 격자.
  inspector.row_count.desc: 격자 분할 시 행(가로 줄) 개수입니다.
  inspector.column_count.desc: 격자 분할 시 열(세로 줄) 개수입니다.
  inspector.cell_width.desc: 한 셀의 가로 픽셀 크기.
  inspector.cell_height.desc: 한 셀의 세로 픽셀 크기.
